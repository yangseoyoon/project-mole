<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>웹캠페이지</title>
    <link rel="stylesheet" href="camera.css" />
  </head>
  <body>

    <div class="cameraPage">
      <!-- 카메라 영역 (검정 네모) -->
      <div class="cameraFrame">
        <video id="video" autoplay playsinline muted></video>

        <!-- 가이드 오버레이 이미지 -->
        <img class="guideOverlay" src="images/guide.png" alt="" />

        <!-- 하단 촬영 버튼 -->
        <button id="captureBtn" class="captureBtn" title="촬영">
          <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="20" cy="20" r="19" stroke="#e9f056" stroke-width="2"/>
            <path d="M10 16.5C10 15.4 10.9 14.5 12 14.5H14.5L16 12H24L25.5 14.5H28C29.1 14.5 30 15.4 30 16.5V26C30 27.1 29.1 28 28 28H12C10.9 28 10 27.1 10 26V16.5Z" stroke="#e9f056" stroke-width="1.8"/>
            <circle cx="20" cy="21" r="4" stroke="#e9f056" stroke-width="1.8"/>
          </svg>
        </button>
      </div>
    </div>

    <canvas id="photoCanvas" style="display:none;"></canvas>
    <script src="camera.js"></script>
  </body>
</html>
